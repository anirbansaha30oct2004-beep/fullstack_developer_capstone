<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/style.css">
  <title>Login - Best Cars</title>
  <style>
    .login-container {
      max-width: 450px;
      margin: auto;
      margin-top: 8%;
      padding: 30px;
      box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-light" style="background-color: darkturquoise; min-height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%; margin-bottom: 0;">Dealerships</h2>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>
  
  <div class="card login-container">
    <h3 class="text-center mb-4">Login</h3>
    <form action="/djangoapp/login/" method="POST">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="userName" placeholder="Enter Username" required>
      </div>
      
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password" required>
      </div>
      
      <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
        <button type="submit" class="btn btn-primary px-4">Login</button>
        <a href="/" class="btn btn-secondary px-4">Cancel</a>
      </div>
    </form>
    
    <div class="text-center mt-3">
      <a href="/register" style="text-decoration: none;">Register Now</a>
    </div>
  </div>

</body>
</html>
